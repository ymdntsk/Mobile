<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Pagar.css">
    <title>Pagar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Irish+Grover&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="sup">
        <div class="Caixa">
            <h4>Total: 30,00R$</h4>

            <form action="">
                <div class="Yk"><label for="Nome">Digite Seu nome: <input type="text"
                            placeholder="Digite seu nome..."></label></div>


                <div class="Yk">
                    <label for="Email">
                        Email: <input type="email" name="Email" id="Email" placeholder="Digite seu Email...">
                    </label>
                </div>

                <div class="Yk">
                    <label for="cpf">
                        Cpf: <input type="number" name="cpf" id="cpf" placeholder="Digite seu Cpf..."></label>
                </div>

                <div class="Yk">
                    <label for="Local de Retirada">
                        Local de Retirada: <input type="text" name="Locar de Retirada" id="Local de Retirada"
                            placeholder="Digite o Local de Retirada...">
                    </label>
                </div>

                <div class="Yk">
                    <label for="pagamento">
                        Forma de pagamento:
                        <select name="pagamento" id="pagamento">
                            <option value="------Selecione-------">>>>>Selecione<<<<<< /option>
                            <option value="Pix">Pix</option>
                            <option value="Cartão (Credido/debito)">Cartão (Credido/debito)</option>
                            <option value="Dinheiro">Dinheiro</option>
                        </select>
                </div>
                <div class="Botao">
                    <a href="Pagamento.html"><button>Enviar</button></a>
                </div>
            </form>

        </div>
    </div>
</body>

</html>
